<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Portfolio Tracker logo">
  <defs>
    <linearGradient id="pt-logo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="pt-logo-stroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa9ff"/>
      <stop offset="100%" stop-color="#c7dcff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#pt-logo-bg)"/>
  <!-- Subtle inner border -->
  <rect x="0.5" y="0.5" width="39" height="39" rx="9.5" fill="none" stroke="rgba(255,255,255,0.15)"/>
  <!-- Ascending bar chart -->
  <g>
    <rect x="8"  y="22" width="4" height="10" rx="1" fill="rgba(255,255,255,0.55)"/>
    <rect x="14" y="17" width="4" height="15" rx="1" fill="rgba(255,255,255,0.75)"/>
    <rect x="20" y="13" width="4" height="19" rx="1" fill="rgba(255,255,255,0.9)"/>
    <rect x="26" y="9"  width="4" height="23" rx="1" fill="#fff"/>
  </g>
  <!-- Trend line over bars -->
  <polyline
    points="10,21 16,16 22,12 28,8"
    fill="none"
    stroke="url(#pt-logo-stroke)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Arrow head on trend line -->
  <path d="M28,8 L31,7 L30,10 Z" fill="#c7dcff"/>
</svg>
